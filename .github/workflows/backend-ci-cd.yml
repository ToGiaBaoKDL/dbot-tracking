name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci-cd.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci-cd.yml"
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: toilachuoituyet/dbot-backend

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    if: |
      startsWith(github.event.head_commit.message, 'feat:') ||
      startsWith(github.event.head_commit.message, 'fix:') ||
      startsWith(github.event.head_commit.message, 'refactor:') ||
      startsWith(github.event.head_commit.message, 'perf:') ||
      startsWith(github.event.head_commit.message, 'test:') ||
      startsWith(github.event.head_commit.message, 'build:') ||
      startsWith(github.event.head_commit.message, 'ci:') ||
      startsWith(github.event.head_commit.message, 'docs:') ||
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Run ruff
        run: |
          uv run ruff check .
          uv run ruff format . --check

      - name: Run type check
        run: uv run mypy app/ --ignore-missing-imports

      - name: Run tests
        env:
          SECRET_KEY: test-secret-key-for-ci-only-must-be-at-least-32-bytes-long
        run: |
          uv run pytest tests/ -v

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test-backend
    if: |
      github.ref == 'refs/heads/main' && (
        startsWith(github.event.head_commit.message, 'feat:') ||
        startsWith(github.event.head_commit.message, 'fix:') ||
        startsWith(github.event.head_commit.message, 'refactor:') ||
        startsWith(github.event.head_commit.message, 'perf:') ||
        startsWith(github.event.head_commit.message, 'build:') ||
        startsWith(github.event.head_commit.message, 'ci:')
      )
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{date 'YYYYMMDD'}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
