services:
  postgres:
    image: postgres:16-alpine
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_postgres_password
      POSTGRES_DB: ${POSTGRES_DB:-stock_signals}
    secrets:
      - db_postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - dbot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: toilachuoituyet/dbot-backend:latest
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://your-domain.com}
    secrets:
      - dbot_secret_key
    ports:
      - "8000:8000"
    networks:
      - dbot-network
    command: >
      sh -c "export SECRET_KEY=$$(cat /run/secrets/dbot_secret_key) && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level info"

  airflow:
    image: apache/airflow:2.11.2-python3.12
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
    environment:
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR:-LocalExecutor}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
      AIRFLOW__CORE__DEFAULT_TIMEZONE: ${AIRFLOW__CORE__DEFAULT_TIMEZONE:-Asia/Ho_Chi_Minh}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./airflow/plugins:/opt/airflow/plugins:ro
      - ./.env:/opt/airflow/.env:ro
    ports:
      - "8080:8080"
    networks:
      - dbot-network
    command: >
      bash -c "
        pip install --no-cache-dir apache-airflow-providers-docker
        airflow db migrate
        airflow users list | grep -q '${AIRFLOW_ADMIN_USER:-admin}' || airflow users create --username '${AIRFLOW_ADMIN_USER:-admin}' --password '${AIRFLOW_ADMIN_PASSWORD:-admin}' --firstname Admin --lastname User --role Admin --email admin@example.com
        airflow webserver &
        airflow scheduler &
        wait
      "

volumes:
  postgres_data:

networks:
  dbot-network:
    driver: overlay
    attachable: true

secrets:
  db_postgres_password:
    external: true
  dbot_secret_key:
    external: true
